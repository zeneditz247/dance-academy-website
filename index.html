<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Dance Academy</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

.hero{
  height:100 vh;
  background:url('bg.jpg') no-repeat center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:100 %;
  height:100 %;
  background:rgba (0,0,0,0.6);
}

.content{
  position:relative;
  z-index:1;
}

h1{
  font-size:2.5 rem;
}

p{
  margin:10 px 0;
}

.btn{
  display:inline-block;
  background:red;
  color:white;
  padding:10 px 20 px;
  text-decoration:none;
}

.section{
  padding:40 px;
  text-align:center;
}

footer{
  background:black;
  color:white;
  text-align:center;
  padding:10 px;
}
</style>

</head>

<body>

<section class="hero">
  <div class="content">
    <h1>ZEN DANCE ACADEMY</h1>
    <p>Feel the Beat, Own the Dance</p>
    <a href="#contact" class="btn">Join Now</a>
  </div>
</section>

<section class="section">
  <h2>About</h2>
  <p>Professional dance training academy.</p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>📞 9876543210</p>
</section>

<footer>
  © 2026 Zen Dance Academy
</footer>

</body>
</html>
