<!DOCTYPE html>
<html>
<head>
    <title>Zen Dance Academy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
        }

        /* HERO SECTION WITH BACKGROUND */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('logo.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 120px 20px;
        }

        h1 {
            font-size: 40px;
        }

        .btn {
            background: red;
            padding: 12px 25px;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .section {
            background: #f2f2f2;
            color: black;
            text-align: center;
            padding: 40px 20px;
        }

        .card {
            display: inline-block;
            background: #ddd;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 10px;
        }

        footer {
            background: black;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <div class="hero">
        <h1>ZEN DANCE ACADEMY</h1>
        <p>Feel the Beat, Own the Dance</p>
        <a href="#" class="btn">Join Now</a>
    </div>

    <!-- CLASSES -->
    <div class="section">
        <h2>Our Classes</h2>
        <div class="card">Hip Hop</div>
        <div class="card">Classical</div>
        <div class="card">Freestyle</div>
    </div>

    <!-- CONTACT -->
    <div class="section">
        <h2>Contact Us</h2>
        <p>Chennai | 9876543210</p>
    </div>

    <footer>
        © 2026 Zen Dance Academy
    </footer>

</body>
</html>
