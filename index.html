<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Dance Academy</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      color: #333;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url('bg.jpg') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeIn 2s ease;
    }

    .hero h1 {
      font-size: 3rem;
      letter-spacing: 3px;
    }

    .hero p {
      margin: 15px 0;
      font-size: 1.2rem;
    }

    .btn {
      display: inline-block;
      background: red;
      color: white;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background: darkred;
      transform: scale(1.05);
    }

    /* SECTION */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section h2 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .classes {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .classes button {
      margin: 10px;
      padding: 12px 25px;
      border: none;
      background: #f2f2f2;
      border-radius: 20px;
      transition: 0.3s;
    }

    .classes button:hover {
      background: red;
      color: white;
    }

    /* WHATSAPP BUTTON */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* FOOTER */
    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>ZEN DANCE ACADEMY</h1>
      <p>Feel the Beat. Own the Dance.</p>
      <a href="#contact" class="btn">Join Now</a>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="section">
    <h2>About Us</h2>
    <p>
      Zen Dance Academy helps you unlock your full potential through
      professional dance training, creativity, and performance.
    </p>
  </section>

  <!-- CLASSES -->
  <section class="section">
    <h2>Our Classes</h2>
    <div class="classes">
      <button>Hip Hop</button>
      <button>Classical</button>
      <button>Freestyle</button>
      <button>Contemporary</button>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <h2>Contact Us</h2>
    <p>📍 Chennai, India</p>
    <p>📞 9876543210</p>
    <p>📧 zendance@email.com</p>
  </section>

  <!-- WHATSAPP -->
  <a href="https://wa.me/919876543210" class="whatsapp">💬</a>

  <!-- FOOTER -->
  <footer>
    © 2026 Zen Dance Academy
  </footer>

</body>
</html>
