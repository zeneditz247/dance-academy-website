<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Dance Academy</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1515169067868-5387ec356754') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .hero p {
      margin: 10px 0;
    }

    .btn {
      background: red;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }

    /* SECTIONS */
    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .classes button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      background: #ddd;
      border-radius: 8px;
    }

    /* FOOTER */
    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: auto;
    }
  </style>
</head>

<body>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div>
        <h1>ZEN DANCE ACADEMY</h1>
        <p>Feel the Beat, Own the Dance</p>
        <button class="btn">Join Now</button>
      </div>
    </section>

    <!-- CLASSES -->
    <section class="section">
      <h2>Our Classes</h2>
      <div class="classes">
        <button>Hip Hop</button>
        <button>Classical</button>
        <button>Freestyle</button>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="section">
      <h2>Contact Us</h2>
      <p>Chennai | 9876543210</p>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    © 2026 Zen Dance Academy
  </footer>

</body>
</html>
